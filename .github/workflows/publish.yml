name: Publish to npm

on:
  push:
    branches: [master, main]
    tags: ["v*"]
    paths:
      - "packages/rich-editor/**"
      - "package-lock.json"
      - ".github/workflows/publish.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is missing."
            echo "Create an npm Automation token and add it at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./packages/rich-editor/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="v${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match package.json version ${{ steps.pkg.outputs.version }} (expected $EXPECTED)"
            exit 1
          fi

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="v${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Release tag $TAG does not match package.json version ${{ steps.pkg.outputs.version }} (expected $EXPECTED)"
            exit 1
          fi

      - name: Check if version is already on npm
        id: npm
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if npm view "@rinsvent/rich-editor@${VERSION}" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already on npm — skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is not on npm yet — will publish."
          fi

      - name: Install dependencies
        if: steps.npm.outputs.published != 'true'
        run: npm ci

      - name: Verify npm authentication
        if: steps.npm.outputs.published != 'true'
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Test and build
        if: steps.npm.outputs.published != 'true'
        run: |
          npm run test --workspace=@rinsvent/rich-editor
          npm run build --workspace=@rinsvent/rich-editor

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        run: npm publish --workspace=@rinsvent/rich-editor --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: >-
          steps.npm.outputs.published != 'true' &&
          github.event_name == 'push' &&
          !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
